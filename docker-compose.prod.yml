services:
  backend:
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_catalog &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "false"

  celery:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  nginx:
    profiles: []
