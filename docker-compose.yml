name: juhniosrold

services:
  db:
    container_name: juhnios_postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: juhniosdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - juhnios_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d juhniosdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: juhnios-backend
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py seed_catalog &&
             python manage.py seed_catalog --warm-cache &&
             python manage.py seed_admin_users &&
             python manage.py seed_orders &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: development-only-change-me
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5174,http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8001}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@juhniosrold.com}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-django}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Juhnios Rold <onboarding@resend.dev>}
      LOCATIONIQ_API_KEY: ${LOCATIONIQ_API_KEY:-}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: juhniosdb
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-Admin123!}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      WOMPI_ENVIRONMENT: ${WOMPI_ENVIRONMENT:-sandbox}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET:-}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-}
      WOMPI_SANDBOX_URL: ${WOMPI_SANDBOX_URL:-https://sandbox.wompi.co/v1}
      WOMPI_PRODUCTION_URL: ${WOMPI_PRODUCTION_URL:-https://production.wompi.co/v1}
      ECOMMERCE_WAREHOUSE_CODE: ${ECOMMERCE_WAREHOUSE_CODE:-PRINCIPAL}
      ECOMMERCE_LOCATION_CODE: ${ECOMMERCE_LOCATION_CODE:-CATALOGO}
      ECOMMERCE_FREE_SHIPPING_THRESHOLD: ${ECOMMERCE_FREE_SHIPPING_THRESHOLD:-80000}
      ECOMMERCE_SHIPPING_COST: ${ECOMMERCE_SHIPPING_COST:-10000}
      SHIPPING_PROVIDER: ${SHIPPING_PROVIDER:-mock}
      SHIPPING_DEFAULT_CARRIER: ${SHIPPING_DEFAULT_CARRIER:-manual}
      SHIPPING_TRACKING_UPDATE_INTERVAL_MINUTES: ${SHIPPING_TRACKING_UPDATE_INTERVAL_MINUTES:-30}
      SHIPPING_WEBHOOK_SECRET: ${SHIPPING_WEBHOOK_SECRET:-}
      ENVIA_API_KEY: ${ENVIA_API_KEY:-}
      ENVIA_API_URL: ${ENVIA_API_URL:-}
      COORDINADORA_API_KEY: ${COORDINADORA_API_KEY:-}
      COORDINADORA_API_URL: ${COORDINADORA_API_URL:-}
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - juhnios_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 180s

  frontend:
    container_name: juhnios-frontend
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: "development"
      CHOKIDAR_USEPOLLING: "true"
      VITE_USE_POLLING: "true"
      VITE_HMR_HOST: "localhost"
      VITE_HMR_PORT: "5174"
      VITE_DEV_SERVER_PORT: "5173"
      VITE_PROXY_TARGET: "http://backend:8000"
      VITE_API_URL: "/api/v1"
      TZ: "America/Bogota"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - juhnios_network
    stdin_open: true
    tty: true

  redis:
    container_name: juhnios-redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - juhnios_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  celery:
    container_name: juhnios-celery
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: development-only-change-me
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@juhniosrold.com}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-django}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Juhnios Rold <no-reply@juhniosrold.com>}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: juhniosdb
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      WOMPI_ENVIRONMENT: ${WOMPI_ENVIRONMENT:-sandbox}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET:-}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-}
      WOMPI_SANDBOX_URL: ${WOMPI_SANDBOX_URL:-https://sandbox.wompi.co/v1}
      WOMPI_PRODUCTION_URL: ${WOMPI_PRODUCTION_URL:-https://production.wompi.co/v1}
      SHIPPING_PROVIDER: ${SHIPPING_PROVIDER:-mock}
      SHIPPING_WEBHOOK_SECRET: ${SHIPPING_WEBHOOK_SECRET:-}
      ENVIA_API_KEY: ${ENVIA_API_KEY:-}
      ENVIA_API_URL: ${ENVIA_API_URL:-}
      COORDINADORA_API_KEY: ${COORDINADORA_API_KEY:-}
      COORDINADORA_API_URL: ${COORDINADORA_API_URL:-}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - juhnios_network

  celery-beat:
    container_name: juhnios-celery-beat
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: development-only-change-me
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@juhniosrold.com}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-django}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Juhnios Rold <no-reply@juhniosrold.com>}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: juhniosdb
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      WOMPI_ENVIRONMENT: ${WOMPI_ENVIRONMENT:-sandbox}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET:-}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-}
      SHIPPING_PROVIDER: ${SHIPPING_PROVIDER:-mock}
      SHIPPING_TRACKING_UPDATE_INTERVAL_MINUTES: ${SHIPPING_TRACKING_UPDATE_INTERVAL_MINUTES:-30}
      SHIPPING_WEBHOOK_SECRET: ${SHIPPING_WEBHOOK_SECRET:-}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - juhnios_network

  nginx:
    container_name: juhnios-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ["production"]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - juhnios_network

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:

networks:
  juhnios_network:
    driver: bridge
